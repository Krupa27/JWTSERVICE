# --- EUREKA CONNECTION FIXES ---
# 1. Point to the EXACT live URL of your registry
eureka.client.service-url.defaultZone=https://serviceregistry-1-p6w0.onrender.com/eureka/


# 2. Tell the Registry how to find this JWT service on the internet
# Add 'RENDER_EXTERNAL_HOSTNAME' as an Env Var in Render Dashboard
eureka.instance.hostname=jwtservice-sgn4.onrender.com
eureka.instance.prefer-ip-address=false

# 3. Force HTTPS communication
eureka.instance.non-secure-port-enabled=false
eureka.instance.secure-port-enabled=true
eureka.instance.secure-port=443

# Use 'create' just once to build the table, then switch to 'update'
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
